<mat-toolbar class="main-header">
  <button mat-button>
    <mat-icon aria-hidden="false" aria-label="Home" fontIcon="store"></mat-icon>
  </button>

  <span class="branding">Modern Angular with Signals</span>

  <span class="spacer"></span>

  <button mat-button>Products</button>

  <button mat-button>
    <mat-icon
      [matBadge]="_CartService.totalItems()"
      [matBadgeHidden]="_CartService.totalItems() === 0"
      matBadgeDescription="Número de items no carrinho"
      aria-hidden="false"
      aria-label="Cart"
      fontIcon="shopping_cart"
    ></mat-icon>
  </button>
</mat-toolbar>

<main class="page">
  <app-products-grid></app-products-grid>
</main>
